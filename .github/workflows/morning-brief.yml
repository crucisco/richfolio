name: Morning Brief

on:
  schedule:
    # Daily: 10pm UTC = 8am AEST (next day)
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "daily"
        type: choice
        options:
          - daily
          - weekly

jobs:
  send-brief:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Write config.json from secret (gitignored, contains private portfolio data)
      - run: printenv CONFIG_JSON > config.json
        env:
          CONFIG_JSON: ${{ secrets.CONFIG_JSON }}

      - run: npm run start
        if: ${{ github.event.inputs.mode != 'weekly' }}
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - run: npm run weekly
        if: ${{ github.event.inputs.mode == 'weekly' }}
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  # Weekly rebalancing report — Sunday 10pm UTC = Monday 8am AEST
  send-weekly:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: printenv CONFIG_JSON > config.json
        env:
          CONFIG_JSON: ${{ secrets.CONFIG_JSON }}

      - run: |
          DAY_OF_WEEK=$(date -u +%u)
          if [ "$DAY_OF_WEEK" = "7" ]; then
            npm run weekly
          else
            echo "Not Sunday (day=$DAY_OF_WEEK), skipping weekly report"
          fi
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
